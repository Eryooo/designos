name: Publish to PyPI

# Manual-only. Tag pushes (v*) do NOT auto-publish to PyPI or create GitHub
# Releases, to avoid accidental cross-channel publishing during npm releases.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: uv build

      - name: Verify wheel contents
        run: |
          whl=$(ls dist/*.whl)
          echo "Wheel: $whl"
          unzip -l "$whl" | grep -E "skills|mcp-servers|AGENTS"
          unzip -l "$whl" | grep "designos/_bundled/skills" || \
            (echo "ERROR: skills not bundled in wheel" && exit 1)
          unzip -l "$whl" | grep "designos/_bundled/AGENTS.md" || \
            (echo "ERROR: AGENTS.md not bundled in wheel" && exit 1)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.target == 'testpypi')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
